@keyframes shake{10%,90%{transform:translate(-9px,5px)}20%,80%{transform:translate(11px,-7px)}

#boom span{color:#74d6ff;letter-spacing:5px;font-size:clamp(11px,1.5vw,16px);opacity:.75;animation:recblink 1.2s steps(1) infinite;}
@keyframes flash{0%{background:#fff}5%{background:#fff}9%{background:#1a0a0a}100%{background:#000}}

<script>
// Overlay coords per slide (1400×800 stage). Empty array = no overlay.
// 43 entries to match the 43 slides.
const OVS=[
  [{"t": "loader", "x": 92, "y": 640, "text": "> INITIATING BRIEF"}], // 1
  [], // 2
  [], // 3
  [{"t": "eyes", "cx": 700, "cy": 232}, {"t": "loader", "x": 92, "y": 612, "text": "> INITIATING BRIEF"}], // 4
  [{"t": "eyes", "cx": 700, "cy": 232}], // 5 title slam
  [], [], [], [], [], [], [], [], [], [], [], [], [], [], [], // 6-20
  [], // 21 Profound
  [], // 22 ACT II
  [], // 23 RAG
  [], // 24 Claude quote
  [], // 25 Out-SEO
  [], // 26 Fable 5
  [{"t": "loader", "x": 92, "y": 690, "text": "> ANALYSING 100 QUERIES"}], // 27 Lily Ray NEW
  [], // 28 ACT III
  [], [], [], [], [], [], // 29-34
  [], // 35 OREO
  [], // 36 ACT IV
  [], [], [], // 37-39 ONE/TWO/THREE
  [], // 40 TITLE CALLBACK
  [], // 41 FINAL CARD
  [{"t": "eyes", "cx": 700, "cy": 235}, {"t": "loader", "x": 92, "y": 690, "text": "> END OF BRIEF"}] // 42 → now 43 walkoff
];
// Note: slide 42 above was previously the walkoff. After inserting Lily Ray at 27, walkoff is slide 43.

const stage=document.getElementById('stage');
function fit(){const s=Math.min(innerWidth/1400,innerHeight/800);stage.style.transform=`translate(-50%,-50%) scale(${s})`;}
addEventListener('resize',fit);fit();
const sl=[...document.querySelectorAll('.sl')];
const intro=document.getElementById('a-intro'),outro=document.getElementById('a-outro');
const LAST=sl.length-1,INTRO_END=3;let on=true,i=0;
let introDone=false,outroStarted=false;
const dwrap=document.getElementById('dots'),ct=document.getElementById('ct');
sl.forEach((_,n)=>{const d=document.createElement('button');d.className='d'+(n?'':' on');d.onclick=()=>{go(n);setHash(n);};dwrap.appendChild(d)});
const ds=[...document.querySelectorAll('.d')];
const ovLayer=document.getElementById('ov');
function renderOv(n){
  ovLayer.innerHTML='';
  (OVS[n]||[]).forEach(o=>{
    if(o.t==='eyes'){const d=document.createElement('div');d.className='ov-eyes';
      d.style.left=(o.cx-61)+'px';d.style.top=(o.cy-10)+'px';d.innerHTML='<b></b><b></b>';ovLayer.appendChild(d);}
    else if(o.t==='loader'){const d=document.createElement('div');d.className='ov-loader';
      d.style.left=o.x+'px';d.style.top=(o.y-24)+'px';
      d.innerHTML=o.text.replace(/&/g,'&amp;').replace(/</g,'&lt;')+' <i>.</i><i>.</i><i>.</i>';ovLayer.appendChild(d);}
  });
}
function audio(n){
  if(!on){intro.pause();outro.pause();return;}
  if(n<=INTRO_END){
    outro.pause();
    if(!introDone && intro.paused){ intro.volume=1; intro.play().catch(()=>{}); }
  } else {
    if(!intro.paused){ intro.pause(); }
    introDone=true;
    if(n===LAST){ if(!outroStarted){ outro.currentTime=0; outro.volume=1; outro.play().catch(()=>{}); outroStarted=true; } }
    else { if(!outro.paused){ outro.pause(); } }
  }
}
function go(n){i=Math.max(0,Math.min(sl.length-1,n));
  sl.forEach((s,k)=>s.classList.toggle('on',k===i));
  ds.forEach((d,k)=>d.classList.toggle('on',k===i));
  ct.textContent=String(i+1).padStart(2,'0')+' / '+String(sl.length).padStart(2,'0');
  renderOv(i); audio(i)}
function pv(){go(i-1);setHash(i);}
function nx(){ if(i===LAST){detonate();return;} go(i+1); setHash(i); }

// Deep linking: URL hash like #27 jumps to slide 27 (1-indexed).
function setHash(n){
  history.replaceState(null,'','#'+(n+1));
}
function readHash(){
  const h=parseInt(location.hash.replace('#',''),10);
  if(!isNaN(h) && h>=1 && h<=sl.length) return h-1;
  return 0;
}

let started=false,detonated=false;
const startEl=document.getElementById('start'),vp=document.getElementById('vp'),boom=document.getElementById('boom');
function begin(){if(started)return;started=true;startEl.style.display='none';
  const startSlide=readHash();
  go(startSlide);audio(startSlide);
  if(startSlide>INTRO_END){introDone=true;} // don't autoplay intro if user deep-linked past it
}
function detonate(){if(detonated)return;detonated=true;intro.pause();outro.pause();
  vp.classList.add('shake');boom.classList.add('show');}
function replay(){detonated=false;boom.classList.remove('show');vp.classList.remove('shake');introDone=false;outroStarted=false;go(0);setHash(0);}

let _px=null;
addEventListener('pointerdown',e=>{_px=e.clientX;},{passive:true});
addEventListener('pointerup',e=>{
  if(!started){begin();return;}
  if(detonated){replay();return;}
  if(e.target&&e.target.closest&&e.target.closest('#snd,#dots,.d,#bar')) return;
  const dx=e.clientX-(_px==null?e.clientX:_px);_px=null;
  if(Math.abs(dx)>45){dx<0?nx():pv();return;}
  (e.clientX/innerWidth<0.22)?pv():nx();
});
addEventListener('keydown',e=>{if(!started){begin();e.preventDefault();return;}
  if(detonated){replay();e.preventDefault();return;}const k=e.key;
  if(['ArrowRight','ArrowDown',' ','PageDown'].includes(k)){nx();e.preventDefault()}
  else if(['ArrowLeft','ArrowUp','PageUp'].includes(k)){pv();e.preventDefault()}
  else if(k==='Home'){go(0);setHash(0);}else if(k==='End'){go(sl.length-1);setHash(sl.length-1);}
  else if(k.toLowerCase()==='f'){document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen()}});
// Listen for hash changes (back/forward buttons)
addEventListener('hashchange',()=>{if(started && !detonated){go(readHash());}});
const sb=document.getElementById('snd');
sb.onclick=()=>{on=!on;sb.textContent=on?'◉ SOUND ON':'◯ SOUND OFF';audio(i)};
go(0);
</script></body></html>
