<script>
// 1:1 with the deck: one card per slide so the numbers always match. 1–4 = cold open (don't speak). n = real deck slide number.
const N=[
{n:1,a:"Cold open · DON'T SPEAK",t:"The film is playing",c:["The cold-open film is playing. DON'T SPEAK.","Let the audio breathe.","(Cards 1–4 just keep you locked to the deck. You start on slide 5.)"],s:"[Cold open, slides 1 to 4. Do not talk. Let the dramatic narration play. You start speaking when the title card lands on slide 5.]"},
{n:2,a:"Cold open · DON'T SPEAK",t:"The film is playing",c:["Still the film. Don't speak.","Wait for the title card (slide 5)."],s:"[Still the cold open. Don't talk over it.]"},
{n:3,a:"Cold open · DON'T SPEAK",t:"The film is playing",c:["Still the film. Don't speak.","Wait for the title card (slide 5)."],s:"[Still the cold open. Don't talk over it.]"},
{n:4,a:"Cold open · DON'T SPEAK",t:"Film hands over next",c:["Last cold-open beat. Don't speak yet.","Get ready: you speak on the NEXT slide (the title card)."],s:"[Cold open about to end. Get ready, you start on the next slide when the title card lands.]"},
{n:5,a:"Open",t:"Title card lands",c:["Right. That was a lot, wasn't it?","'Don't worry, I'm not going to talk to you like that for the next fifteen minutes.'","Let it slip, then straight into the backstory.","(The film already did the John Connor line, don't repeat it here.)"],s:"Right. That was a lot, wasn't it? Don't worry, I'm not going to talk to you like that for the next fifteen minutes. I'll let that one slip."},
{n:6,a:"Backstory",t:"The seed",c:["Quick backstory, so you know who to blame.","I was ranting in LinkedIn comments: Google's algorithm has been broken since the 2022 helpful-content update.","One line: 'don't hate the players, hate the game.'"],s:"Quick backstory, so you know who to blame. I was ranting in the LinkedIn comments about how the Google algorithm has been fundamentally broken since the helpful content update in 2022. And I wrote one line: don't hate the players, hate the game."},
{n:7,a:"Backstory",t:"The invite",c:["EGR saw it and asked ME to write a piece.","I said yes. I absolutely love to rant."],s:"Someone from EGR Global saw it and asked <b>me</b> if I wanted to write a piece. I said yes. I absolutely love to rant."},
{n:8,a:"Backstory",t:"The stage",c:["Then someone read the piece and asked me to do it in real life.","I said yes again. So if it bombs, it's a chain of other people's decisions. I'm the last link."],s:"Then someone read that piece and asked me if I wanted to come and do it in real life. I also said yes. So welcome to Don't Hate the Player, Hate the Prompt. If this goes badly, it's a long chain of other people's decisions. I'm just the last link."},
{n:9,a:"Act I · the lie",t:"The lie",c:["Act I. The one lie everything else hangs on.","'Here's the lie I'd like to kill in the next fifteen minutes.'","'I'd apologise in advance, but I genuinely won't mean it.'","Hold a beat, then into the hands-up."],s:"Here's the lie I'd like to kill in the next fifteen minutes. I'd apologise in advance, but I genuinely won't mean it. <i>[hold a beat, then straight into the hands-up]</i>"},
{n:10,a:"Act I · the lie",t:"Hands up",c:["HANDS UP, actually put them up: who's been told in the last 6 months to 'rank in ChatGPT'?","Yeah. That's a lot of hands.","By the end I want every hand back down, and staying down."],s:"Quick survey. Hands up, actually put your hand up so I can count, if in the last six months or so you've been told you need to start ranking in ChatGPT. <i>[beat]</i> Yeah. As expected. That's a lot of hands. By the end of the next fifteen minutes I want every hand in this room back down, and hopefully staying down."},
{n:11,a:"Act I · the lie",t:"Who's selling it · posts wall (1 of 3)",c:["Hands down. Now look who's actually doing the telling.","Real LinkedIn posts, last 12 months.","First up: Neil Patel, from NP Digital. Name and shame."],s:"Put your hands down, because I want to show you who's actually doing the telling. These are real LinkedIn posts from the last twelve months. First up, Neil Patel, from NP Digital. Name and shame."},
{n:12,a:"Act I · the lie",t:"Who's selling it · posts wall (2 of 3)",c:["The wall keeps building: Steven, Julian, Lenny.","All of them some version of 'how to rank number one in ChatGPT.'"],s:"Then you've got Steven. Julian. Lenny. All of them some version of how to rank number one in ChatGPT."},
{n:13,a:"Act I · the lie",t:"Who's selling it · posts wall (3 of 3) → mirror",c:["And my favourite, on the right: Connor. Perfect for the Terminator 2 analogy. Thank you, Connor.","That's six. I stopped at six because my thumbs started hurting.","Bridge: 'So before you buy what any of them are selling, do one thing for me…' → mirror."],s:"And my favourite, on the right there, Connor. Which is perfect for the Terminator 2 analogy I'm running today. So thank you for that, Connor. That's six. I stopped at six because my thumbs started hurting. So before you buy what any of them are selling, do one thing for me."},
{n:14,a:"Act I · the lie",t:"Mirror check (job titles)",c:["Take a look in the mirror.","The person who told you probably had a fluffy job title:","'Head of'… 'Director of'… 'Founder OR Growth?'",">> the joke is OR. Lift it like a question. Confident. Got a course."],s:"Take a look in the mirror. Because the person who told you to rank in ChatGPT probably had some kind of fluffy job title. Head of. <b>Director of. Founder OR Growth?</b> <i>[beat]</i> I'm not sure what that last one does all day, but he's very confident. And he's got a course."},
{n:15,a:"Act I · surface",t:"You don't rank. You surface.",c:["Saying this early so we know why we're here: ranking in ChatGPT is not a real thing.","You don't rank. You SURFACE.","The gap between those two words = a six-figure consultancy invoice vs an in-house team that actually knows what they're doing."],s:"I'll say it early, so we know why we're here. Ranking in ChatGPT isn't a real thing. You don't rank, you surface. And the difference between those two words is the difference between a six-figure consultancy invoice and an in-house team that actually knows what they're doing."},
{n:16,a:"Act I · surface",t:"I'm Mark",c:["Hello, I'm Mark. I run SEO and ASO at MrQ.","The next fifteen minutes are probably going to upset some people.","I think that's a really good thing. Let's go."],s:"Hello, I'm Mark. I run SEO and ASO at MrQ. And the next fifteen minutes are probably going to upset some people. I think that's a really good thing. So let's go, shall we?"},
{n:17,a:"Act I · it's just SEO",t:"GEO · AEO · LLMO",c:["AI hit the mainstream, ChatGPT became a verb, marketeers panicked (affection, I'm one).","A consultancy economy materialises overnight to sell the cure.","A dozen names: GEO, AEO, LLMO, Danny Sullivan's joke LMNOPEO.","All end in -EO. It's SEO with the price tag still on."],s:"Here's what happened. AI hit the mainstream, ChatGPT became a verb, and marketeers panicked. I say that with affection, I am one. And whenever we panic, a consultancy economy materialises overnight to sell the cure. It's got a dozen names: GEO, AEO, LLMO. Danny Sullivan coined LMNOPEO as a joke. They all end in E-O, engine optimisation, because the easiest way to sell something new is to make it sound like something you already buy. It's SEO with the price tag still on."},
{n:18,a:"Act I · it's just SEO",t:"'AI SEO' isn't a new planet  ★NEW",c:["So is any of it genuinely new? A sliver.","Two circles, AI optimisation and SEO: mostly the SAME circle.","They sell it like a new planet to colonise. It isn't. The thin new crescent is real, more in a second."],s:"So is any of this actually new? A sliver. Picture two circles, AI optimisation and SEO. They sell you AI SEO like it's a new planet you have to go and colonise. It isn't. It's mostly the same circle you already live on. There's a thin crescent that's genuinely new, and we'll get to it, but anyone telling you to abandon SEO and start again is selling a map to a planet that doesn't exist."},
{n:19,a:"Act I · it's just SEO",t:"'Good SEO is good GEO.' Mostly.  ★NEW",c:["Credit where credit's due: Cyrus Shepard says good SEO is good GEO. Mostly.","Doesn't run in reverse. The real new bits: AI-visibility tracking, citation-gap analysis, agent-ready sites, entity consistency.","Grain of salt: Google mostly wants to sell us ads."],s:"And to be fair, credit where credit's due. Cyrus Shepard, who ran global SEO at Moz, mostly agrees: good SEO is good GEO. And he's mostly right. But mostly carries some weight, because it doesn't run in reverse. There are genuinely new things now: tracking whether you show up in the models, citation-gap analysis, making your site readable to agents, keeping your entities consistent. That's the crescent, it's real, it's just not a new planet. And take Google's advice with a grain of salt. They mostly want to sell us ads."},
{n:20,a:"Act I · why sceptical",t:"Why is the model sceptical?",c:["The cure is for an illness we don't actually have. Quick interlude before the receipts.","Why would the model be sceptical of optimised pages in the first place?","Same reason you should never Google your symptoms. Google taught us this decades ago."],s:"But the cure is for an illness we don't actually have. So first: why would the model be sceptical of an optimised page in the first place? Because Google taught us this decades ago. Same reason you should never Google your symptoms."},
{n:21,a:"Act I · why sceptical",t:"Consensus: a double edge",c:["'Is the earth flat?' → confident no, roughly a sphere. Consensus working. (ta, Mark Williams-Cook, for the analogy)","'What's wrong with me?' → you've got cancer, you're going to die. Same mechanism, opposite outcome.","Best SEO ≠ most accurate, just the best backlinks. A content farm wearing a stethoscope.","ChatGPT just queries Google's index. Same source pool, same problem."],s:"If you type is the earth flat into Google, you get a confident no, it's roughly a sphere, and thank you Mark Williams-Cook for letting me steal that analogy. That's consensus working as intended. Now Google what's wrong with me next to your symptoms, and you'll be told you've got cancer and you're going to die. Same mechanism, opposite outcome. The site with the best SEO doesn't have the most accurate answer, it just has the best backlinks. It might be a content farm wearing a stethoscope. And ChatGPT is just querying Google's index via retrieval. Same source pool, same problem."},
{n:22,a:"Act I · the confession",t:"We are the problem it was built to solve",c:["How does it filter without a backlink audit? Consensus. Six trusted sources agreeing beat one over-optimised page.","Confession: when my girlfriend Googles mid-argument to prove her point, I take the phone and reverse-engineer the search to back my side. SERPs are downstream of how you ask. Ten years of it. She finds it annoying. Fair.","I'm not the only SEO in this room who can do that. The model knows we exist.","We're not the audience for the system prompt. We're the problem it was written to solve."],s:"The model can't run a backlink audit, so how does it filter? By consensus. Six trusted sources saying the same thing about your brand outweigh one over-optimised page saying something different. Quick confession. When my girlfriend Googles something mid-argument to prove her point, I take the phone out of her hand and reverse-engineer the search to support my side, because the SERPs are downstream of how you ask the question. I've been doing this for ten years. She finds it annoying. It's completely fair. And I'm not the only SEO in this room who does that. The model knows people like us exist. That's why the system prompt reads the way it does. We're not its audience. We're the problem it was written to solve."},
{n:23,a:"Act I · why sceptical",t:"36% / 90% — Claude vs ChatGPT",c:["Quick caveat: not every model behaves the same.","Profound's zero-click research: Claude transposes Brave's top ten directly, the most 'ranking' model, but only ~36% of AI search.","ChatGPT's a lot bigger. So 'ranking in ChatGPT' sells a behaviour that doesn't exist in the engine that matters most."],s:"One caveat before the receipts: not every model behaves the same. New research from Profound's zero-click study shows Claude transposes Brave's top ten directly, the most ranking-like model on the market. But Claude's only about 36% of AI search. ChatGPT is a lot bigger. So when a consultant sells you ranking in ChatGPT, they're selling a behaviour that doesn't even exist in the engine that matters most."},
{n:24,a:"Act II · receipts",t:"The receipts",c:["Act II. Theory's over.","'This is the bit where I stop having opinions and start showing you screenshots.'","Receipts."],s:"Right. That's the theory done. This is the bit where I stop having opinions and start showing you screenshots. Receipts."},
{n:25,a:"Act II · receipts",t:"How it actually works",c:["Ask 'best online casinos in the UK' (my day job).","It triggers a web search → pulls a candidate pool → runs it through an instruction layer → writes the answer.","That instruction layer = the system prompt. It tells the model what to trust, ignore, flag as suspect. Box 3. Nobody selling GEO mentions it."],s:"When you ask ChatGPT a question, like what are the best online casinos in the UK, the model triggers a web search, pulls back a candidate pool, and runs it through a layer of instructions. That instruction layer is what I call the system prompt, and it tells the model what to trust and what to flag as suspect. That third box, the hidden one, is the bit nobody selling you GEO has ever mentioned."},
{n:26,a:"Act II · receipts",t:"The leaked system prompt",c:["The prompts for Claude Opus, GPT-5.5, Gemini all leaked. I covered it in EGR, that's why I'm here.","One line should be tattooed on every iGaming SEO's chest:","'Be appropriately sceptical of results… subject to a lot of SEO, like product recommendations… highly ranked but inaccurate or misleading.'","Anthropic hard-coded distrust into Claude."],s:"The system prompts for Claude Opus, GPT-5.5 and Gemini all leaked, and I covered them in EGR, which is why I'm here today. One line in Claude's prompt, and I'm not joking, should be tattooed on every iGaming SEO's chest: <b>be appropriately sceptical of results for topics subject to a lot of search engine optimisation, like product recommendations, or results that might be highly ranked but inaccurate or misleading.</b> Anthropic hard-coded that into Claude. The most optimised SERPs are the least trustworthy."},
{n:27,a:"Act II · receipts",t:"You cannot out-SEO the system prompt",c:["Which query category did they have in mind? 'Best online casinos.' 'Best slots.' 'Best UK sportsbook.'","Every high-intent query in our vertical sits dead centre of the SERP this filter was written for.","You cannot out-SEO the system prompt. Not a ranking problem, a source-quality problem."],s:"So which SERPs do we think they had in mind? What query describes a product recommendation, highly ranked but possibly inaccurate, most precisely? Best online casinos. Best online slots. Best UK sportsbook. Every single high-intent commercial query in our vertical sits in the dead centre of the SERP this filter was written for. And you cannot out-SEO the system prompt. You cannot optimise your way past an instruction that names your entire category as content to distrust. This isn't a ranking problem, it's a source-quality problem."},
{n:28,a:"Act II · receipts",t:"And it gets worse",c:["It gets worse. Newest leak (Fable) files product recommendations alongside conspiracy theories, pseudoscience, contested political events.","Your 'best casinos' page now sits in the same trust bucket as flat-earth content. (callback)","That's the company you keep. Mic-drop bit's over."],s:"And it gets worse. In the newest leaked Claude prompt, Fable, product recommendations subject to a lot of SEO are filed alongside conspiracy theories, pseudoscience and contested political events. So your best online casinos page now sits in the same trust bucket as flat-earth content. That's the callback. That is the company you are keeping. Okay, the mic-drop bit is over."},
{n:29,a:"Act II · receipts",t:"69% — the Lily Ray study",c:["'At least I get cited'? Lily Ray ran 100 'best' queries through AI Overviews.","69% of self-promoting listicles got cited, but the brand that wrote them was left OUT of the recommendation.","Citation ≠ recommendation. You wrote the guest list and didn't get in."],s:"And if you're thinking, well, at least I get cited, research from Lily Ray ran a hundred best-category queries through Google's AI Overviews. Sixty-nine percent of self-promoting listicles got cited, and the brand that wrote them got left out of the actual recommendation. Citation is not recommendation. The competitors you named in your own listicle get recommended in your place. You wrote the guest list, and you didn't get in."},
{n:30,a:"Act II · receipts",t:"Someone read ChatGPT's network traffic  ★NEW",c:["My favourite receipt: Suganthan read two days of ChatGPT's raw traffic.","1) it fetches via commercial scrapers, so be cleanly scrapable.","2) hide a fact in JavaScript and it quotes your competitor instead, hands the customer to a review site.","3) it won't cite you about you. Third-party coverage wins."],s:"One more receipt, my favourite, because someone did the unglamorous work. Suganthan Mohanadasan read two days of ChatGPT's actual network traffic. Three things. One, it fetches the web through commercial scrapers, so if your page isn't cleanly scrapable you're invisible in the tier that matters. Two, hide a fact behind JavaScript, like a price that loads on click, and it can't read it, so it quotes your competitor's number instead. Three, the killer, it will not cite you about you. The recommendation always comes from someone else. Third-party coverage wins."},
{n:31,a:"Act III · what to do",t:"The framework",c:["Act III. If you can't rank, what CAN you do?","The part nobody's selling, because there's no acronym for it yet,","and no acronym means no invoice.","Become a source the model wants to trust."],s:"So if you cannot rank in ChatGPT, what can you do? Here's the part nobody is selling, because there's no acronym to wrap it in yet. And no acronym means no invoice. You become a source the model wants to trust."},
{n:32,a:"Act III · what to do",t:"Surface. Don't rank.",c:["Retrieval pulls a pool, the prompt filters it, what survives is the few it trusts.","So it's a TRUST problem, not a ranking problem.","Win the trust filter, not the position. (one clean pass, don't loop on it)"],s:"Retrieval pulls a candidate pool, the system prompt filters it, and what survives is the small handful it trusts. So it's a trust problem, not a ranking problem. You win the trust filter, not the position."},
{n:33,a:"Act III · what to do",t:"Ranking vs surfacing",c:["I'll hold my hand up: this is BORING.","No acronym, no 30-day masterclass. It's a return to disciplines we abandoned when programmatic SEO got cheaper than real journalists.","Bad news for consultants. Good news for in-house teams."],s:"And I'll hold my hand up here, this is boring. There's no acronym, there's no thirty-day masterclass. It's a return to a set of disciplines the industry abandoned when programmatic SEO became cheaper than real journalists. Which is bad news for consultants, and good news for in-house teams."},
{n:34,a:"Act III · SEQ",t:"SEQ — the framework",c:["Three pillars. I named it SEQ a year ago at MrQ, mainly as a joke.","Then I went home, tested it, and it actually worked.","That's why I'm here, and not in a meeting room making jokes about it. Structure, Expertise, Quality."],s:"Let me show you the three pillars. I named it SEQ about a year ago when I started at MrQ, mainly as a joke. But then I went home and tested it, and it actually worked. That's why I'm standing here talking about it instead of in a meeting room making jokes about it. Structure, Expertise, Quality."},
{n:35,a:"Act III · SEQ",t:"S — Structure",c:["STRUCTURE, the boring stuff: build the page so a machine can actually read it.","Most casino sites bury the odds and payouts in prose it can't parse.","Cost of entry. Without it, nothing else matters (the Metallica song).","Model can't even read you. Denied by the bouncer at the door, however good the fake ID."],s:"Structure is the boring stuff. Build the page so a machine can actually read it. Most casino sites bury the odds and payouts in prose it can't parse. It's the cost of entry, and without it nothing else matters, like the Metallica song. The model can't even read you. You're denied by the bouncer at the door, no matter how good your fake ID looks."},
{n:36,a:"Act III · SEQ",t:"E — Expertise",c:["EXPERTISE, the bit consultants can't sell, because there's no shortcut.","Real, named, qualified people, not content farms with freelancers under pseudonyms.","The model treats an anonymous page like an unsigned restaurant review on a domain you've never heard of.","You don't buy it, you build it."],s:"Expertise is the bit consultants can't sell, because there's no shortcut. Real, named, qualified people writing your content, not content farms with rotating freelancers under pseudonyms. The model treats an anonymous page the way you'd treat an unsigned restaurant review on a domain you've never heard of. You don't buy it, you build it."},
{n:37,a:"Act III · SEQ",t:"Q — Quality",c:["QUALITY: accept the model's been told not to trust your domain by default.","Earn it back by being undeniably correct, undeniably useful, undeniably original. (hopefully a bit like me today)","Not rewritten from a competitor, not AI-generated. Your own primary research, your own platform numbers."],s:"Quality is where you accept the model has been instructed not to trust your domain pattern by default. You earn the trust back by being undeniably correct, undeniably useful, and undeniably original. Hopefully a bit like me today. Not rewritten from a competitor, not AI-generated. Original primary research, with numbers from your own platform, and player-facing utility the model can verify when it cross-references you."},
{n:38,a:"Act III · the prize",t:"Machine true",c:["This is what Charles Floate calls 'machine true.'","Six trusted sources saying the same thing about your brand → you become machine true. Entity stacking.","Mark Williams-Cook's said it for ages in different words. I'm just yelling louder."],s:"This is what Charles Floate called machine true. When six trusted sources say the same thing about your brand, you become machine true. It's entity stacking at work. It's also what Mark Williams-Cook has been saying publicly for ages. They're using different words for the same mechanism. I'm just yelling about it a bit louder today."},
{n:39,a:"Act III · the twist",t:"OREO",c:["Punchline's on me: it's just SEO. The same SEO that worked in 2014, before we ditched it for programmatic.","Dima's sharper line: it's not even SEO, it's ORM, online reputation management. He called it OREO.","The joke's the answer: the model's doing reputation management, across six sources instead of one review site."],s:"So the punchline's on me: it's just SEO. The same SEO that worked in 2014, before the industry ditched it for programmatic. Then my mate Dima sharpened it: this isn't even SEO, it's ORM, online reputation management, the thing we did back in 2010. He called it OREO. Probably a joke, but the joke's the answer, because the model is doing reputation management, just across six trusted sources instead of one review site."},
{n:40,a:"Act III · the twist",t:"The work",c:["The whole secret, after the framework, the logo and the acronym:","'Do the work.' I'm aware that's an anticlimax. I'm living it.","Let it land."],s:"So after the framework, the logo and the three-letter acronym, the big secret is: do the work. I'm aware that's an anticlimax. I'm living it. <i>[let it land]</i>"},
{n:41,a:"Close · three sentences",t:"One.",c:["Land it in three sentences.","ONE: ranking in ChatGPT isn't a thing, you surface. No consultant can sell you a shortcut around an instruction in the model's own system prompt."],s:"Let me land this in three sentences. One. Ranking in ChatGPT, that's not a thing, you surface in it. No consultant in the world can sell you a shortcut around an instruction in the model's own system prompt. Remember that."},

const TOTAL=47;
let i=0;
const $=id=>document.getElementById(id);
function render(){
  const d=N[i];
  $('act').textContent=d.a;
  $('num').textContent='SLIDE '+String(d.n).padStart(2,'0')+' / '+TOTAL;
  $('title').textContent=d.t;
  $('cues').innerHTML=d.c.map(x=>'<li>'+x.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</li>').join('');
  $('talk').innerHTML=d.s;
  $('nexttitle').textContent=(i+1<N.length)?(N[i+1].n+' · '+N[i+1].t):'— end · walk off —';
  $('bar').style.width=(d.n/TOTAL*100)+'%';
  try{history.replaceState(null,'',location.pathname+'#'+d.n);}catch(e){}
}
function go(idx){i=Math.max(0,Math.min(N.length-1,idx));render();}
function nx(){go(i+1)} function pv(){go(i-1)}
let _px=null;
addEventListener('pointerdown',e=>{_px=e.clientX},{passive:true});
addEventListener('pointerup',e=>{
  if(e.target&&e.target.closest&&e.target.closest('#talkwrap,#cuewrap'))return;
  const dx=e.clientX-(_px==null?e.clientX:_px);_px=null;
  if(Math.abs(dx)>45){dx<0?nx():pv();return;}
  (e.clientX/innerWidth<0.2)?pv():nx();
});
addEventListener('keydown',e=>{const k=e.key;
  if(['ArrowRight','ArrowDown',' ','PageDown'].includes(k)){nx();e.preventDefault();}
  else if(['ArrowLeft','ArrowUp','PageUp'].includes(k)){pv();e.preventDefault();}
  else if(k==='Home')go(0); else if(k==='End')go(N.length-1);
  else if(k.toLowerCase()==='t')toggleClock();
  else if(k.toLowerCase()==='b')$('black').classList.toggle('on');
  else if(k.toLowerCase()==='f'){document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen();}
});
$('black').onclick=()=>$('black').classList.remove('on');
let t0=null,tick=null;
function fmt(s){const m=Math.floor(s/60),x=s%60;return String(m).padStart(2,'0')+':'+String(x).padStart(2,'0');}
function toggleClock(){ if(tick){clearInterval(tick);tick=null;return;} if(!t0)t0=Date.now(); tick=setInterval(()=>{$('clock').textContent=fmt(Math.floor((Date.now()-t0)/1000));},250); }
const _h=parseInt((location.hash||'').replace('#',''),10);
let bi=0; if(_h){const f=N.findIndex(x=>x.n===_h); if(f>=0)bi=f;}
go(bi);
</script></body></html>
